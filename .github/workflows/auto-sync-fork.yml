name: Auto Sync Fork

# Mantém este fork sincronizado com o upstream automaticamente.
# Usa a API nativa merge-upstream do GitHub (o mesmo "Sync fork" da interface):
# roda server-side, sem checkout, é rápida e atualiza até arquivos
# .github/workflows/ (o GITHUB_TOKEN padrão não conseguiria via git push).
#
# AVISO POR E-MAIL: se a sincronização falhar (fork divergiu do upstream ou há
# conflito), o job termina com erro (exit 1) e o GitHub envia e-mail de falha
# automaticamente ao dono do repositório. Requer, na conta:
# Settings > Notifications > Actions > "Send notifications for failed workflows only".

on:
  schedule:
    - cron: "0 6 * * 1"      # semanal (segunda, 06:00 UTC; ~a cada 7 dias)
  workflow_dispatch:          # botão manual "Run workflow" na aba Actions

permissions:
  contents: write

concurrency:
  group: auto-sync-fork
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sincronizar fork com o upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="$(gh api "repos/${GITHUB_REPOSITORY}" --jq .default_branch)"
          UPSTREAM_REPO="$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.parent.full_name // empty')"

          if [ -z "${UPSTREAM_REPO}" ]; then
            echo "Este repositório não é um fork com upstream configurado; nada para sincronizar."
            exit 0
          fi

          FORK_SHA="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${BRANCH}" --jq .sha)"
          UPSTREAM_SHA="$(gh api "repos/${UPSTREAM_REPO}/commits/${BRANCH}" --jq .sha)"

          if [ "${FORK_SHA}" = "${UPSTREAM_SHA}" ]; then
            echo "Sem mudanças no upstream (${UPSTREAM_REPO}:${BRANCH}); sincronização não é necessária."
            exit 0
          fi

          echo "-> Sincronizando ${GITHUB_REPOSITORY} (branch ${BRANCH}) com o upstream..."
          if gh api --method POST "repos/${GITHUB_REPOSITORY}/merge-upstream" -f branch="${BRANCH}"; then
            echo "OK: fork sincronizado (ou ja estava atualizado)."
          else
            echo "ERRO: merge automatico falhou - o fork divergiu do upstream ou ha conflito."
            echo "O GitHub enviara e-mail de falha ao dono do repositorio. Requer sincronizacao manual."
            exit 1
          fi
